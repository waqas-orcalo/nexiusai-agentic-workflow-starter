version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: aac_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: aac_db
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - aac_network

volumes:
  mongodb_data:

networks:
  aac_network:
    driver: bridge
